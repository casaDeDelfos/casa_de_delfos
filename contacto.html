<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="styles.css">
    <script src="componentes.js"></script>
</head>
<body>

    <mi-header></mi-header>

    <main class="container">

        <div class="taller-layout">

            <h2>Contacto</h2>
            <form action="https://formspree.io/f/mqewzzqb" method="POST" class="contact-form">
                
                <div class="form-group">
                    <label for="name">Nombre completo</label>
                    <input type="text" id="name" name="name" placeholder="Tu nombre..." required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Mensaje / Consulta</label>
                    <textarea id="message" name="message" rows="5" placeholder="¿En qué podemos orientarte?" required></textarea>
                </div>

                <button type="submit" class="btn-primary">Enviar Mensaje</button>
                
            </form>
        </div>
    </main>

    <mi-footer></mi-footer>
</body>
</html>
