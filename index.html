<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Casa de Delfos">
    <title>Casa de Delfos</title>
    <link rel="stylesheet" href="styles.css">
    <script src="componentes.js"></script>
</head>
<body>

    <mi-header></mi-header>

    <section class="carousel-container">
        <div class="carousel-track">
            <div class="slide slide-1">
                <div class="container">
                    <h2>Bienvenido a la<br>CASA DE DELFOS</h2>
                </div>
            </div>
            <div class="slide slide-2">
                <div class="container">
                    <h2>Astrología Arquetípica</h2>
                </div>
            </div>
            <div class="slide slide-3">
                <div class="container">
                    <h2>Chamanismo y Ritual</h2>
                </div>
            </div>
        </div>
    </section>

    <main class="container">
       <h2 class="section-title">Cursos Disponibles</h2>
        
        <div class="grid-talleres">
            <a href="astrologia.html" class="card">
                <div class="card-img" style="background-image: url('astrologia.png');"></div>
                <div class="card-content">
                    <h3 class="card-title">Astrología Arquetípica</h3>
                    <p class="card-desc">Claves simbólicas para leer tu Carta Natal</p>
                    <span class="card-link">Inscríbete &rarr;</span>
                </div>
            </a>

            <a href="chamanismo.html" class="card">
                <div class="card-img" style="background-image: url('chamanismo.png');"></div>
                <div class="card-content">
                    <h3 class="card-title">Chamanismo y Ritual</h3>
                    <p class="card-desc">Claves simbólicas de una tradición ancestral</p>
                    <span class="card-link">Inscríbete &rarr;</span>
                </div>
            </a>
        </div>
    </main>

    <mi-footer></mi-footer>

</body>
</html>
